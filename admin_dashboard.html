<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - NEET Exam</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; background: #343a40; color: white; padding: 10px 20px; border-radius: 5px; }
        .logout-btn { background: #dc3545; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
        .container { display: flex; flex-wrap: wrap; gap: 20px; margin-top: 20px; }
        .box { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); flex: 1; min-width: 300px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
        .approve-btn { background: #28a745; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 3px; }
        input[type="text"], input[type="number"], input[type="datetime-local"], select { width: 90%; padding: 8px; margin: 8px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .submit-btn { background: #007bff; color: white; border: none; padding: 10px; width: 100%; cursor: pointer; border-radius: 4px; margin-top: 10px; font-size: 16px; }
        .hidden { display: none; }
        
        /* चेकबॉक्ससाठी नवीन डिझाईन */
        .checkbox-group { max-height: 150px; overflow-y: auto; border: 1px solid #ccc; padding: 10px; border-radius: 4px; margin-top: 5px; background-color: #fafafa; }
        .checkbox-item { margin-bottom: 8px; display: flex; align-items: center; cursor: pointer; }
        .checkbox-item input { margin-right: 10px; width: auto; cursor: pointer; transform: scale(1.2); }
        .checkbox-item label { cursor: pointer; font-size: 14px; }
    </style>
</head>
<body>

    <div class="header">
        <h2>ॲडमिन डॅशबोर्ड</h2>
        <button class="logout-btn" onclick="logout()">लॉगआउट करा</button>
    </div>

    <div class="container">
        <div class="box">
            <h3>प्रलंबित विद्यार्थी (Pending Approvals)</h3>
            <table>
                <thead>
                    <tr>
                        <th>नाव</th>
                        <th>मोबाईल नंबर</th>
                        <th>कृती</th>
                    </tr>
                </thead>
                <tbody id="students-list">
                    <tr><td colspan="3">लोड होत आहे...</td></tr>
                </tbody>
            </table>
        </div>

        <div class="box">
            <h3>नवीन परीक्षा तयार करा</h3>
            <input type="text" id="exam_title" placeholder="परीक्षेचे नाव (उदा. Biology Mock Test)">
            
            <select id="exam_type" onchange="toggleFilters()">
                <option value="Monthly">मासिक (Monthly) - सर्व सिलॅबस</option>
                <option value="Yearly">वार्षिक (Yearly) - सर्व सिलॅबस</option>
                <option value="Subject">विषयवार (Subject-wise)</option>
                <option value="Chapter">चाप्टर-निहाय (Chapter-wise)</option>
            </select>
            
            <div id="subject_box" class="hidden">
                <label style="font-weight: bold;">विषय निवडा (एकापेक्षा जास्त निवडू शकता):</label>
                <div id="exam_subjects" class="checkbox-group"></div>
            </div>

            <div id="chapter_box" class="hidden">
                <label style="font-weight: bold;">चाप्टर निवडा (एकापेक्षा जास्त निवडू शकता):</label>
                <div id="exam_chapters" class="checkbox-group"></div>
            </div>

            <input type="number" id="total_questions" placeholder="एकूण प्रश्न संख्या">
            <input type="datetime-local" id="valid_until" title="परीक्षा कधीपर्यंत ऍक्टिव्ह राहील">
            
            <button class="submit-btn" onclick="createExam()">परीक्षा जनरेट करा</button>
            <p id="exam-msg" style="margin-top: 10px; font-weight: bold;"></p>
        </div>
    </div>

<script>
    const SUPABASE_URL = 'https://rabujuzuycdkxalyelcd.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_6xnlWswPyQ_BbzKySdHGAw_waSsMuf0';
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const TABLE_NAME = 'NEET QUESTION BANK';

    async function checkAdmin() {
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (!session) { window.location.href = "index.html"; return; }

        const userId = session.user.id;
        const { data: profile } = await supabaseClient.from('profiles').select('role').eq('id', userId).single();

        if (!profile || profile.role !== 'admin') {
            alert("तुम्हाला हे पेज पाहण्याचा अधिकार नाही!");
            window.location.href = "index.html";
        } else {
            fetchPendingStudents();
            fetchSubjects(); 
        }
    }

    async function fetchPendingStudents() {
        const { data, error } = await supabaseClient.from('profiles').select('*').eq('role', 'student').eq('is_active', false);
        const tbody = document.getElementById('students-list');
        tbody.innerHTML = "";

        if (error || data.length === 0) {
            tbody.innerHTML = "<tr><td colspan='3'>कोणतेही नवीन विद्यार्थी प्रलंबित नाहीत.</td></tr>";
            return;
        }

        data.forEach(student => {
            let row = `<tr>
                <td>${student.name}</td>
                <td>${student.mobile_number}</td>
                <td><button class='approve-btn' onclick="approveStudent('${student.id}')">Activate</button></td>
            </tr>`;
            tbody.innerHTML += row;
        });
    }

    async function approveStudent(studentId) {
        const { error } = await supabaseClient.from('profiles').update({ is_active: true }).eq('id', studentId);
        if (!error) {
            alert("विद्यार्थी यशस्वीरीत्या ॲक्टिव्हेट झाला!");
            fetchPendingStudents();
        }
    }

    function toggleFilters() {
        const type = document.getElementById('exam_type').value;
        const subjectBox = document.getElementById('subject_box');
        const chapterBox = document.getElementById('chapter_box');

        if (type === 'Subject') {
            subjectBox.classList.remove('hidden');
            chapterBox.classList.add('hidden');
        } else if (type === 'Chapter') {
            subjectBox.classList.remove('hidden');
            chapterBox.classList.remove('hidden');
        } else {
            subjectBox.classList.add('hidden');
            chapterBox.classList.add('hidden');
        }
    }

    // चेकबॉक्सद्वारे विषय लोड करणे
    async function fetchSubjects() {
        const { data, error } = await supabaseClient.from(TABLE_NAME).select('*').limit(1);
        
        if (data && data.length > 0) {
            const isCapital = data[0].hasOwnProperty('Subject');
            const colName = isCapital ? 'Subject' : 'subject';
            const { data: subjectData } = await supabaseClient.from(TABLE_NAME).select(colName);
            
            if (subjectData) {
                const uniqueSubjects = [...new Set(subjectData.map(q => q[colName]).filter(Boolean))];
                const subjContainer = document.getElementById('exam_subjects');
                
                subjContainer.innerHTML = uniqueSubjects.map((s, index) => `
                    <div class="checkbox-item">
                        <input type="checkbox" value="${s}" id="subj_${index}" onchange="fetchChapters()">
                        <label for="subj_${index}">${s}</label>
                    </div>
                `).join('');
            }
        }
    }

    // निवडलेल्या चेकबॉक्सनुसार चाप्टर्स लोड करणे
    async function fetchChapters() {
        // कोणते विषय चेक केले आहेत ते तपासणे
        const selectedSubjects = Array.from(document.querySelectorAll('#exam_subjects input:checked')).map(cb => cb.value);
        const chapContainer = document.getElementById('exam_chapters');
        
        if (selectedSubjects.length === 0) {
            chapContainer.innerHTML = "";
            return;
        }

        const { data: sampleData } = await supabaseClient.from(TABLE_NAME).select('*').limit(1);
        
        if (sampleData && sampleData.length > 0) {
            const isCapitalSubj = sampleData[0].hasOwnProperty('Subject');
            const isCapitalChap = sampleData[0].hasOwnProperty('Chapter');
            
            const colSubj = isCapitalSubj ? 'Subject' : 'subject';
            const colChap = isCapitalChap ? 'Chapter' : 'chapter';

            const { data: chapterData } = await supabaseClient.from(TABLE_NAME).select(colChap).in(colSubj, selectedSubjects);
                
            if (chapterData) {
                const uniqueChapters = [...new Set(chapterData.map(q => q[colChap]).filter(Boolean))];
                
                chapContainer.innerHTML = uniqueChapters.map((c, index) => `
                    <div class="checkbox-item">
                        <input type="checkbox" value="${c}" id="chap_${index}">
                        <label for="chap_${index}">${c}</label>
                    </div>
                `).join('');
            }
        }
    }

    async function createExam() {
        const title = document.getElementById('exam_title').value;
        const type = document.getElementById('exam_type').value;
        const questions = document.getElementById('total_questions').value;
        const validUntil = document.getElementById('valid_until').value;
        const msgBox = document.getElementById('exam-msg');

        // चेक केलेल्या चेकबॉक्सची माहिती गोळा करणे
        const selectedSubjects = Array.from(document.querySelectorAll('#exam_subjects input:checked')).map(cb => cb.value).join(', ');
        const selectedChapters = Array.from(document.querySelectorAll('#exam_chapters input:checked')).map(cb => cb.value).join(', ');

        if (!title || !questions || !validUntil) {
            msgBox.style.color = "red";
            msgBox.innerText = "कृपया सर्व माहिती भरा.";
            return;
        }

        msgBox.style.color = "blue";
        msgBox.innerText = "परीक्षा सेव्ह होत आहे...";

        const { error } = await supabaseClient.from('exams').insert([
            { 
                exam_title: title, 
                exam_type: type, 
                total_questions: parseInt(questions), 
                valid_until: validUntil,
                subjects: type !== 'Monthly' && type !== 'Yearly' ? selectedSubjects : null,
                chapters: type === 'Chapter' ? selectedChapters : null
            }
        ]);

        if (error) {
            msgBox.style.color = "red";
            msgBox.innerText = "चूक: " + error.message;
        } else {
            msgBox.style.color = "green";
            msgBox.innerText = "परीक्षा यशस्वीरीत्या जनरेट झाली!";
            
            // फॉर्म रिकामा करणे
            document.getElementById('exam_title').value = "";
            document.getElementById('total_questions').value = "";
            document.getElementById('valid_until').value = "";
            
            // सर्व चेकबॉक्स अनचेक करणे
            document.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
            document.getElementById('exam_chapters').innerHTML = ""; 
        }
    }

    async function logout() {
        await supabaseClient.auth.signOut();
        window.location.href = "index.html";
    }

    checkAdmin();
</script>
</body>
</html>
